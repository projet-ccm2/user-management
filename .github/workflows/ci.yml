name: call-ci
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  ci:
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-ci.yml@main
    permissions:
      contents: read
      pull-requests: write
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN_SECRET: ${{ secrets.GITHUB_TOKEN }}
      