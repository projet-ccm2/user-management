name: Deploy to Development
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: dev-{sha})"
        required: false
        type: string
        default: ""
      force-deploy:
        description: "Force deployment even if no changes"
        required: false
        type: boolean
        default: false

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Deploy to Cloud Run
        uses: ./.github/workflows/shared-workflows/.github/workflows/nodejs-cd.yml
        with:
          service-name: user-management-dev
          service-region: europe-west1
          service-memory: 512Mi
          service-cpu: 1
          service-max-instances: 5
          service-min-instances: 0
          service-timeout: 300
          service-port: 8080
          environment: development
          project-id: ${{ secrets.GCP_PROJECT_ID }}
          docker-image-name: user-management-api
          docker-tag: ${{ github.event.inputs.image-tag || format('dev-{0}', github.sha) }}
          health-check-url: ${{ secrets.DEV_HEALTH_CHECK_URL }}
        secrets:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
          API_KEY: ${{ secrets.DEV_API_KEY }}
