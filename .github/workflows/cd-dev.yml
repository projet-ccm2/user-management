name: Deploy to Development
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: dev-{sha})"
        required: false
        type: string
        default: ""
      force-deploy:
        description: "Force deployment even if no changes"
        required: false
        type: boolean
        default: false

jobs:
  deploy-dev:
    name: Deploy to Development
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      node-version: '22.13.1'
      build-command: 'npm run build'
      install-command: 'npm install'
      dockerfile-path: './Dockerfile'
      docker-context: '.'
      docker-image-name: user-management-api
      docker-tag: ${{ github.event.inputs.image-tag || format('dev-{0}', github.sha) }}
      registry-url: 'ghcr.io'
      environment: development
      health-check-timeout: '300'
      gcp-region: europe-west1
      cloud-run-service-name: user-management-dev
      cloud-run-port: '8080'
      cloud-run-memory: '256Mi'
      cloud-run-cpu: '1'
      cloud-run-max-instances: '2'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
