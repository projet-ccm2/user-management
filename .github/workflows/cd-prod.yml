name: Deploy to Production
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: Deploy to Production
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      docker-image-name: user-management-api-prod
      docker-tag: ${{ github.event.inputs.image-tag || format('dev-{0}', github.sha) }}
      artifact-registry-repository: "user-management-docker-prod"
      environment: production
      service_type: bff
      cloud-run-service-name: user-management-prod
      required_env_vars: GCP_SA_KEY,GCP_PROJECT_ID,TWITCH_CLIENT_ID,TWITCH_ISSUER,TWITCH_EXTENSION_SECRET,ALLOWED_ORIGINS,DB_SERVICE_URL,AUTH_SERVICE_URL,JWT_SECRET
    secrets:
      GCP_SA_KEY: ${{ secrets.PROD_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.PROD_GCP_PROJECT_ID }}
      TWITCH_CLIENT_ID: ${{ secrets.PROD_TWITCH_CLIENT_ID }}
      TWITCH_ISSUER: ${{ secrets.PROD_TWITCH_ISSUER }}
      ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
      DB_SERVICE_URL: ${{ secrets.PROD_DB_SERVICE_URL }}
      AUTH_SERVICE_URL: ${{ secrets.PROD_AUTH_SERVICE_URL }}
      JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
      TWITCH_EXTENSION_SECRET: ${{ secrets.PROD_TWITCH_EXTENSION_SECRET }}
