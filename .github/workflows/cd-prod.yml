name: Deploy to Production
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: Deploy to Production
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      node-version: '22.13.1'
      build-command: 'npm run build'
      install-command: 'npm install'
      dockerfile-path: './Dockerfile'
      docker-context: '.'
      docker-image-name: user-management-api
      docker-tag: ${{ github.event.inputs.version || github.ref_name }}
      registry-url: 'europe-west1-docker.pkg.dev'
      artifact-registry-repository: 'user-management-docker'
      environment: production
      health-check-timeout: '300'
      gcp-region: europe-west1
      cloud-run-service-name: user-management-prod
      cloud-run-port: '8080'
      cloud-run-memory: '1Gi'
      cloud-run-cpu: '2'
      cloud-run-max-instances: '5'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      HEALTH_CHECK_URL: ${{ secrets.PROD_HEALTH_CHECK_URL }}

  production-health-checks:
    name: Run Production Health Checks
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name != 'pull_request'
    steps:
      - name: Run Production Health Checks
        run: |
          echo "🔍 Running production health checks..."
          # Here you can add production-specific health checks
          # For example, test the health endpoint, check metrics, etc.

      - name: Notify Production Team
        run: |
          echo "✅ Successfully deployed to production environment"
          echo "Version: ${{ github.event.inputs.version || github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: production"
          echo "Production deployment completed"
