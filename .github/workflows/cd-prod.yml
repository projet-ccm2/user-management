name: Deploy to Production
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: Deploy to Production
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      docker-image-name: user-management-api-prod
      docker-tag: ${{ github.event.inputs.image-tag || format('dev-{0}', github.sha) }}
      artifact-registry-repository: 'user-management-docker-prod'
      environment: production
      cloud-run-service-name: user-management-prod

    secrets:
      GCP_SA_KEY: ${{ secrets.PROD_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.PROD_GCP_PROJECT_ID }}
      HEALTH_CHECK_URL: ${{ secrets.PROD_HEALTH_CHECK_URL }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}

  production-health-checks:
    name: Run Production Health Checks
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name != 'pull_request'
    steps:
      - name: Run Production Health Checks
        run: |
          echo "🔍 Running production health checks..."
          # Here you can add production-specific health checks
          # For example, test the health endpoint, check metrics, etc.

      - name: Notify Production Team
        run: |
          echo "✅ Successfully deployed to production environment"
          echo "Version: ${{ github.event.inputs.version || github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: production"
          echo "Production deployment completed"
