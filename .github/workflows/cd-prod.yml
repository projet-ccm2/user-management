name: Deploy to Production
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Cloud Run
        uses: ./.github/workflows/shared-workflows/.github/workflows/nodejs-cd.yml
        with:
          service-name: user-management-prod
          service-region: europe-west1
          service-memory: 2Gi
          service-cpu: 4
          service-max-instances: 100
          service-min-instances: 2
          service-timeout: 300
          service-port: 8080
          environment: production
          project-id: ${{ secrets.GCP_PROJECT_ID }}
          docker-image-name: user-management-api
          docker-tag: ${{ github.event.inputs.version || github.ref_name }}
          health-check-url: ${{ secrets.PROD_HEALTH_CHECK_URL }}
        secrets:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          API_KEY: ${{ secrets.PROD_API_KEY }}

      - name: Run Production Health Checks
        run: |
          echo "🔍 Running production health checks..."
          # Here you can add production-specific health checks
          # For example, test the health endpoint, check metrics, etc.

      - name: Notify Production Team
        run: |
          echo "✅ Successfully deployed to production environment"
          echo "Version: ${{ github.event.inputs.version || github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: production"
          echo "Production deployment completed"
