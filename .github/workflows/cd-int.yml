name: Deploy to Integration
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: int-{sha})"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Run integration tests after deployment"
        required: false
        type: boolean
        default: true

jobs:
  deploy-int:
    name: Deploy to Integration
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      node-version: '22.13.1'
      build-command: 'npm run build'
      install-command: 'npm install'
      dockerfile-path: './Dockerfile'
      docker-context: '.'
      docker-image-name: user-management-api
      docker-tag: ${{ github.event.inputs.image-tag || format('int-{0}', github.sha) }}
      registry-url: 'europe-west1-docker.pkg.dev'
      artifact-registry-repository: 'user-management-docker'
      environment: integration
      health-check-timeout: '300'
      gcp-region: europe-west1
      cloud-run-service-name: user-management-int
      cloud-run-port: '3000'
      cloud-run-memory: '512Mi'
      cloud-run-cpu: '1'
      cloud-run-max-instances: '3'
    secrets:
      GCP_SA_KEY: ${{ secrets.INT_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.INT_GCP_PROJECT_ID }}
      HEALTH_CHECK_URL: ${{ secrets.INT_HEALTH_CHECK_URL }}
      TWITCH_CLIENT_ID: ${{ secrets.INT_TWITCH_CLIENT_ID }}
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-int
    if: github.event_name != 'pull_request' && github.event.inputs.run-tests != false
    steps:
      - name: Run Integration Tests
        run: |
          echo "🧪 Running integration tests..."
          # Here you can add specific integration tests
          # For example, test the API with curl or automated tests

      - name: Notify QA Team
        run: |
          echo "✅ Successfully deployed to integration environment"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: integration"
          echo "Ready for QA testing"
