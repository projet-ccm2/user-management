name: Deploy to Integration
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-int:
    name: Deploy to Integration
    runs-on: ubuntu-latest
    environment: integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials ${{ secrets.GCP_CLUSTER_NAME_INT }} --zone ${{ secrets.GCP_ZONE }}

      - name: Deploy Infrastructure with Terraform
        uses: projet-ccm2/shared-workflows/.github/workflows/terraform-deploy.yml@main
        with:
          environment: integration
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          region: ${{ secrets.GCP_REGION }}
          zone: ${{ secrets.GCP_ZONE }}
          cluster_name: ${{ secrets.GCP_CLUSTER_NAME_INT }}
          database_url: ${{ secrets.INT_DATABASE_URL }}
          jwt_secret: ${{ secrets.INT_JWT_SECRET }}
          api_key: ${{ secrets.INT_API_KEY }}
          github_owner: ${{ github.repository_owner }}
          image_tag: int-${{ github.sha }}
          domain_name: ${{ secrets.INT_DOMAIN_NAME }}

      - name: Deploy Application to Kubernetes
        run: |
          # Update image in deployment
          kubectl set image deployment/user-management-api user-management-api=ghcr.io/${{ github.repository }}/user-management-api:int-${{ github.sha }} -n user-management-int

          # Wait for rollout
          kubectl rollout status deployment/user-management-api -n user-management-int

          # Verify deployment
          kubectl get pods -n user-management-int
          kubectl get services -n user-management-int

      - name: Run Integration Tests
        run: |
          echo "🧪 Running integration tests..."
          # Here you can add specific integration tests
          # For example, test the API with curl or automated tests

      - name: Notify QA Team
        run: |
          echo "✅ Successfully deployed to integration environment"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: integration"
          echo "Ready for QA testing"
