name: Deploy to Integration
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: int-{sha})"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Run integration tests after deployment"
        required: false
        type: boolean
        default: true

jobs:
  deploy-int:
    name: Deploy to Integration
    runs-on: ubuntu-latest
    environment: integration
    steps:
      - name: Deploy to Cloud Run
        uses: ./.github/workflows/shared-workflows/.github/workflows/nodejs-cd.yml
        with:
          service-name: user-management-int
          service-region: europe-west1
          service-memory: 1Gi
          service-cpu: 2
          service-max-instances: 10
          service-min-instances: 1
          service-timeout: 300
          service-port: 8080
          environment: integration
          project-id: ${{ secrets.GCP_PROJECT_ID }}
          docker-image-name: user-management-api
          docker-tag: ${{ github.event.inputs.image-tag || format('int-{0}', github.sha) }}
          health-check-url: ${{ secrets.INT_HEALTH_CHECK_URL }}
        secrets:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.INT_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.INT_JWT_SECRET }}
          API_KEY: ${{ secrets.INT_API_KEY }}

      - name: Run Integration Tests
        if: ${{ github.event.inputs.run-tests != false }}
        run: |
          echo "🧪 Running integration tests..."
          # Here you can add specific integration tests
          # For example, test the API with curl or automated tests

      - name: Notify QA Team
        run: |
          echo "✅ Successfully deployed to integration environment"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: integration"
          echo "Ready for QA testing"
